[baidu_asr]
# 百度智能云语音识别（ASR）密钥配置
#
# 申请方式（示意）：
# 1) 登录百度智能云控制台 -> 人工智能 -> 语音技术/语音识别（ASR）
# 2) 创建应用，获取 API Key / Secret Key
#
# 将本文件复制为 `config/asr_secrets.toml` 并填入真实值（该文件建议加入 .gitignore，避免提交到 GitHub）
api_key = "YOUR_BAIDU_API_KEY"
secret_key = "YOUR_BAIDU_SECRET_KEY"

[asr]
# 默认 Provider：baidu
provider = "baidu"

# 百度 VOP 的开发者参数（普通话常用）
dev_pid = 1537

# 网络超时（秒）
timeout = 18

# 分段时长（秒），用于长音频切片识别再拼接
chunk_seconds = 45

# 标准化到的目标采样率/声道（VOP 通常要求 16k/单声道）
target_sample_rate = 16000
target_channels = 1

