[baidu_ocr]
# 百度智能云 OCR（通用文字识别）密钥配置
#
# 申请方式（示意）：
# 1) 登录百度智能云控制台 -> 人工智能 -> 文字识别 OCR
# 2) 创建应用，获取 API Key / Secret Key
#
# 将本文件复制为 `config/ocr_secrets.toml` 并填入真实值（该文件已加入 .gitignore，不会提交到 GitHub）
api_key = "YOUR_BAIDU_API_KEY"
secret_key = "YOUR_BAIDU_SECRET_KEY"

[ocr]
# 默认 Provider：baidu / aliyun
provider = "baidu"

# 图片预处理建议参数（可按需调整）
max_side = 1600
jpeg_quality = 85

# 网络超时（秒）
timeout = 12
